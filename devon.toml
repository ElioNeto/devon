# devon.toml — configuração de perfis de provider para o Devon
# Copie este arquivo para devon.toml e ajuste conforme seu ambiente.
# SEGURANÇA: Chaves de API NUNCA devem ser colocadas aqui em texto plano.
# Use sempre `api_key_env` apontando para o nome de uma variável de ambiente.
# SEGURANÇA: Sandbox configura restrições para execução de comandos shell.

[defaults]
profile = "fast"   # perfil usado quando --profile não é especificado
mode    = "auto"   # auto | safe | yolo

[[profiles]]
name        = "fast"
provider    = "openai"
api_key_env = "OPENROUTER_KEY"
base_url    = "https://openrouter.ai/api/v1"
model       = "mistralai/devstral-2512:free"
fallback    = ["local"]

[[profiles]]
name        = "local"
provider    = "ollama"
base_url    = "http://localhost:11434/v1"
model       = "qwen2.5-coder:32b"

[[profiles]]
name        = "power"
provider    = "anthropic"
api_key_env = "ANTHROPIC_KEY"
base_url    = "https://api.anthropic.com/v1"
model       = "claude-sonnet-4-5"
fallback    = ["fast"]

# =============================================================================
# HEADLESS — Servidor HTTP/SSE para integração com CI/CD
# =============================================================================
# Inicie com: devon headless
# Ou: devon --headless --port 9876
#
# [headless]
# enabled = true
# host = "127.0.0.1"
# port = 9876

# =============================================================================
# SANDBOX — Restrições de execução de comandos shell
# =============================================================================
# Blocklist: comandos sempre bloqueados (padrão + extensões)
[sandbox]
blocklist = [
    # Adicione comandos personalizados bloqueados neste projeto
    # "rm -rf /tmp/sensivel",
    # "curl | sh",
]

# Allowlist: se definida, APENAS comandos na lista podem ser executados
# Quando vazia, todos os comandos (não blocklistados) são permitidos
allowlist = [
    # "go",
    # "git",
    # "make",
]

# Limite máximo de processos subshell paralelos
max_processes = 3

# Timeouts específicos por padrão de comando
# Exemplos:
# [[sandbox.timeouts]]
# pattern = "go test"
# timeout = 120
#
# [[sandbox.timeouts]]
# pattern = "npm install"
# timeout = 180
